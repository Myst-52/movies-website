<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>经典电影 · 经典馆</title>
<style>
  :root {
    --bg: #f5f3ef;
    --bg-gradient: radial-gradient(ellipse 80% 60% at 50% -10%, #faf8f5 0%, #f0ece6 70%);
    --card: #ffffff;
    --card-hover: #fcfaf7;
    --text: #2a2622;
    --text-muted: #8f8a84;
    --border: #e5e0d8;
    --border-hover: #c9c0b6;
    --accent: #b8943e;
    --accent-hover: #a07e2e;
    --accent-dim: rgba(184, 148, 62, 0.08);
    --rating: #c9a03a;
    --shadow: 0 2px 12px rgba(0,0,0,0.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.07);
    --radius: 14px;
    --overlay-bg: rgba(60, 55, 50, 0.45);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", -apple-system, sans-serif;
    background: var(--bg);
    background-image: var(--bg-gradient);
    color: var(--text);
    min-height: 100vh;
  }
  ::selection { background: var(--accent-dim); color: var(--accent); }

  /* Header */
  .header {
    padding: 56px 32px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .header h1 {
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  .header h1 {
    background: linear-gradient(135deg, var(--accent) 0%, #d4b86a 50%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header h1 em { font-style: normal; font-weight: 600; }
  .header p {
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Search */
  .search-wrap {
    max-width: 1200px;
    margin: 0 auto 32px;
    padding: 0 32px;
  }
  .search-bar {
    display: flex;
    gap: 12px;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 4px 4px 4px 24px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.3s, border-color 0.3s;
  }
  .search-bar:focus-within {
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    border-color: var(--border-hover);
  }
  .search-bar input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    padding: 12px 0;
    background: transparent;
    color: var(--text);
    font-family: inherit;
  }
  .search-bar input::placeholder { color: #555; }
  .search-bar select {
    border: none;
    outline: none;
    font-size: 13px;
    color: var(--text-muted);
    background: transparent;
    padding: 8px 4px;
    font-family: inherit;
    cursor: pointer;
    border-left: 1px solid var(--border);
    padding-left: 16px;
  }
  .search-bar select option { background: var(--card); color: var(--text); }
  .search-bar .count {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    padding-right: 16px;
  }
  .search-bar .btn-search {
    background: linear-gradient(135deg, var(--accent), #c9a84c);
    color: #fff;
    font-weight: 600;
    border: none;
    border-radius: 50px;
    padding: 10px 28px;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    font-family: inherit;
    letter-spacing: 0.5px;
  }
  .search-bar .btn-search:hover { opacity: 0.9; transform: scale(1.02); }

  /* Movie Grid */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  /* Movie Card */
  .movie-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 24px 22px 20px;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s, background 0.3s;
    position: relative;
    animation: fadeUp 0.4s ease both;
  }
  .movie-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: linear-gradient(135deg, rgba(201,168,76,0.03), transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .movie-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    border-color: var(--border-hover);
    background: var(--card-hover);
  }
  .movie-card:hover::before { opacity: 1; }
  .movie-card .year {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .movie-card .title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.45;
    margin-bottom: 14px;
    transition: color 0.3s;
  }
  .movie-card:hover .title { color: var(--accent); }
  .movie-card .meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }
  .movie-card .rating {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-weight: 600;
    color: var(--rating);
    letter-spacing: 0.5px;
  }
  .movie-card .rating .star { font-size: 14px; }
  .movie-card .genre-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 14px;
  }
  .movie-card .genre-tags span {
    font-size: 10px;
    padding: 3px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    letter-spacing: 0.3px;
    transition: border-color 0.3s, color 0.3s;
  }
  .movie-card:hover .genre-tags span {
    border-color: var(--border-hover);
  }

  /* Genre tag colors for light theme */
  .movie-card .genre-tags span[data-tag="剧情"] { border-color: rgba(79, 110, 247, 0.25); color: #5a73d6; }
  .movie-card .genre-tags span[data-tag="爱情"] { border-color: rgba(219, 68, 145, 0.25); color: #c4458a; }
  .movie-card .genre-tags span[data-tag="喜剧"] { border-color: rgba(200, 150, 30, 0.3); color: #b8941e; }
  .movie-card .genre-tags span[data-tag="科幻"] { border-color: rgba(6, 150, 180, 0.25); color: #1a8fa8; }
  .movie-card .genre-tags span[data-tag="动作"] { border-color: rgba(210, 60, 60, 0.25); color: #c23a3a; }
  .movie-card .genre-tags span[data-tag="犯罪"] { border-color: rgba(140, 70, 210, 0.25); color: #8847c9; }
  .movie-card .genre-tags span[data-tag="悬疑"] { border-color: rgba(100, 110, 120, 0.3); color: #6b757f; }
  .movie-card .genre-tags span[data-tag="战争"] { border-color: rgba(200, 110, 10, 0.25); color: #bd6914; }
  .movie-card .genre-tags span[data-tag="奇幻"] { border-color: rgba(20, 170, 120, 0.25); color: #1a9e72; }
  .movie-card .genre-tags span[data-tag="动画"] { border-color: rgba(230, 130, 40, 0.25); color: #cf7528; }
  .movie-card .genre-tags span[data-tag="传记"] { border-color: rgba(220, 100, 160, 0.25); color: #c75f95; }
  .movie-card .genre-tags span[data-tag="冒险"] { border-color: rgba(30, 180, 160, 0.25); color: #22a890; }
  .movie-card .genre-tags span[data-tag="家庭"] { border-color: rgba(210, 170, 20, 0.25); color: #c2a012; }
  .movie-card .genre-tags span[data-tag="历史"] { border-color: rgba(140, 130, 120, 0.3); color: #8a8078; }
  .movie-card .genre-tags span[data-tag="音乐"] { border-color: rgba(190, 60, 210, 0.25); color: #ad3cc9; }
  .movie-card .genre-tags span[data-tag="歌舞"] { border-color: rgba(210, 60, 140, 0.25); color: #c43c82; }
  .movie-card .genre-tags span[data-tag="惊悚"] { border-color: rgba(100, 100, 100, 0.3); color: #706a64; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .movie-card:nth-child(1) { animation-delay: 0.02s; }
  .movie-card:nth-child(2) { animation-delay: 0.04s; }
  .movie-card:nth-child(3) { animation-delay: 0.06s; }
  .movie-card:nth-child(4) { animation-delay: 0.08s; }
  .movie-card:nth-child(5) { animation-delay: 0.10s; }
  .movie-card:nth-child(6) { animation-delay: 0.12s; }
  .movie-card:nth-child(7) { animation-delay: 0.14s; }
  .movie-card:nth-child(8) { animation-delay: 0.16s; }
  .movie-card:nth-child(9) { animation-delay: 0.18s; }
  .movie-card:nth-child(10) { animation-delay: 0.20s; }
  .movie-card:nth-child(11) { animation-delay: 0.22s; }
  .movie-card:nth-child(12) { animation-delay: 0.24s; }
  .movie-card:nth-child(13) { animation-delay: 0.26s; }
  .movie-card:nth-child(14) { animation-delay: 0.28s; }
  .movie-card:nth-child(15) { animation-delay: 0.30s; }
  .movie-card:nth-child(16) { animation-delay: 0.32s; }
  .movie-card:nth-child(17) { animation-delay: 0.34s; }
  .movie-card:nth-child(18) { animation-delay: 0.36s; }
  .movie-card:nth-child(19) { animation-delay: 0.38s; }
  .movie-card:nth-child(20) { animation-delay: 0.40s; }

  /* Empty */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
    font-size: 15px;
    letter-spacing: 0.5px;
  }

  /* Detail Overlay */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--overlay-bg);
    backdrop-filter: blur(10px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }
  .detail-overlay.open { display: flex; }
  .detail-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    max-width: 640px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 44px 40px 36px;
    position: relative;
    animation: panelIn 0.35s ease;
    box-shadow: var(--shadow-lg);
  }
  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-track { background: transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  @keyframes panelIn {
    from { opacity: 0; transform: scale(0.94) translateY(12px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .detail-close {
    position: absolute;
    top: 18px;
    right: 22px;
    background: none;
    border: none;
    font-size: 22px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 10px;
    line-height: 1;
    transition: color 0.2s;
    border-radius: 8px;
  }
  .detail-close:hover { color: var(--text); background: var(--card-hover); }
  .detail-panel .title {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--text);
  }
  .detail-panel .sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 24px;
    letter-spacing: 0.5px;
  }
  .detail-panel .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 24px;
  }
  .detail-panel .info-item {
    font-size: 14px;
    color: var(--text);
  }
  .detail-panel .info-item .label {
    color: var(--text-muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .detail-panel .summary {
    font-size: 14px;
    line-height: 1.9;
    color: #b0aba5;
    border-top: 1px solid var(--border);
    padding-top: 22px;
    color: #5a5650;
  }
  .detail-panel .director-info {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    font-size: 15px;
    color: var(--text);
  }
  .detail-panel .director-info .region-tag {
    font-size: 10px;
    padding: 3px 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    letter-spacing: 0.3px;
    background: var(--bg);
  }
  .detail-panel .rating-big {
    font-size: 40px;
    font-weight: 300;
    color: var(--rating);
    margin-bottom: 20px;
  }
  .detail-panel .rating-big small { font-size: 18px; color: var(--rating); }
  .detail-panel .genres-wrap {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .detail-panel .genres-wrap span {
    font-size: 11px;
    padding: 3px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    background: var(--bg);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .header { padding: 40px 20px 28px; }
    .header h1 { font-size: 28px; }
    .search-wrap, .container { padding: 0 16px; }
    .search-bar { flex-wrap: wrap; border-radius: 16px; padding: 12px; }
    .search-bar input { width: 100%; padding: 8px 0; }
    .search-bar select { border-left: none; padding-left: 0; }
    .search-bar .count { display: none; }
    .search-bar .btn-search { width: 100%; text-align: center; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .movie-card { padding: 18px 16px; }
    .movie-card .title { font-size: 14px; }
    .detail-panel { padding: 32px 24px 28px; }
    .detail-panel .info-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><em>经典</em>电影馆</h1>
  <p>华语 · 世界 · 银幕记忆</p>
</div>

<div class="search-wrap">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索片名、导演或类型…" oninput="filterMovies()">
    <select id="searchField" onchange="filterMovies()">
      <option value="all">全部字段</option>
      <option value="title">片名</option>
      <option value="director">导演</option>
      <option value="genre">类型</option>
    </select>
    <span class="count" id="resultCount">0 部</span>
    <button class="btn-search" onclick="filterMovies()">搜索</button>
  </div>
</div>

<div class="container">
  <div class="grid" id="movieGrid"></div>
</div>

<!-- Detail Overlay -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div class="title" id="dtTitle"></div>
    <div class="sub" id="dtSub"></div>
    <div class="director-info" id="dtDirector"></div>
    <div class="rating-big" id="dtRating"></div>
    <div class="info-grid">
      <div class="info-item"><div class="label">年份</div><div id="dtYear"></div></div>
      <div class="info-item"><div class="label">片长</div><div id="dtDuration"></div></div>
      <div class="info-item"><div class="label">类型</div><div id="dtGenre"></div></div>
      <div class="info-item"><div class="label">制片地区</div><div id="dtRegion"></div></div>
    </div>
    <div class="summary" id="dtSummary"></div>
  </div>
</div>

or":{"name":"格斯·范·桑特","region":"美国"},"year":1997,"genre":["剧情"],"rating":8.9,"duration":126,"region":["美国"],"summary":"麻省理工学院的清洁工威尔是个数学天才，却用叛逆和暴力把自己封闭起来。心理医生肖恩用真诚的对话，帮他走出了童年的阴影。"}]};
let movies = [];

function init() {
  movies = MOVIES_DATA.movies || [];
  renderMovies(movies);
}

function renderMovies(list) {
  const grid = document.getElementById('movieGrid');
  const count = document.getElementById('resultCount');
  count.textContent = list.length + ' 部';
  if (list.length === 0) {
    grid.innerHTML = '<div class="empty">没有找到匹配的电影</div>';
    return;
  }
  grid.innerHTML = list.map((m, i) => {
    const year = m.year || '—';
    const rating = m.rating || '—';
    const genres = m.genre || [];
    return `<div class="movie-card" onclick="showDetail(${i})" style="animation-delay:${(i % 20) * 0.02}s">
      <div class="year">${year}</div>
      <div class="title">${m.title}</div>
      <div class="meta">
        <span class="rating"><span class="star">★</span>${rating}</span>
      </div>
      <div class="genre-tags">${genres.map(g => `<span data-tag="${g}">${g}</span>`).join('')}</div>
    </div>`;
  }).join('');
  window._movieList = list;
}

function filterMovies() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const field = document.getElementById('searchField').value;
  if (!q) { renderMovies(movies); return; }
  const filtered = movies.filter(m => {
    if (field === 'title' || field === 'all') {
      if (m.title.toLowerCase().includes(q)) return true;
    }
    if (field === 'director' || field === 'all') {
      if (m.director && m.director.name && m.director.name.toLowerCase().includes(q)) return true;
    }
    if (field === 'genre' || field === 'all') {
      if (m.genre && m.genre.some(g => g.toLowerCase().includes(q))) return true;
    }
    return false;
  });
  renderMovies(filtered);
}

function showDetail(index) {
  const list = window._movieList || movies;
  const m = list[index];
  if (!m) return;

  const overlay = document.getElementById('detailOverlay');
  document.getElementById('dtTitle').textContent = m.title;
  document.getElementById('dtSub').textContent = (m.original_title || '') + (m.year ? ' · ' + m.year : '');
  const directorName = m.director ? m.director.name : '未知';
  const directorRegion = m.director ? m.director.region : '';
  document.getElementById('dtDirector').innerHTML = `导演：${directorName} ${directorRegion ? `<span class="region-tag">${directorRegion}</span>` : ''}`;
  document.getElementById('dtRating').innerHTML = `<small>★</small> ${m.rating || '—'} <small style="font-size:13px;color:var(--text-muted)">/ 10</small>`;
  document.getElementById('dtYear').textContent = m.year || '—';
  document.getElementById('dtDuration').textContent = m.duration ? m.duration + ' 分钟' : '—';
  document.getElementById('dtGenre').innerHTML = m.genre ? `<div class="genres-wrap">${m.genre.map(g => `<span>${g}</span>`).join('')}</div>` : '—';
  document.getElementById('dtRegion').textContent = m.region ? m.region.join(' / ') : '—';
  document.getElementById('dtSummary').textContent = m.summary || '暂无简介。';
  overlay.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
}

// Close on backdrop click
document.getElementById('detailOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeDetail();
});

// Enter key triggers search
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDetail();
  if (e.key === 'Enter' && document.activeElement === document.getElementById('searchInput')) {
    filterMovies();
  }
});

init();
</script>
